            const transparentFallback = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
            if (!url) return transparentFallback;
            let strUrl = String(url).trim();
            if (!strUrl || strUrl === '') return transparentFallback;
            if (strUrl.startsWith('data:image')) return strUrl;
            
            let driveId = null;
            if (strUrl.includes('drive.google.com')) {
                const match = strUrl.match(/\/d\/([a-zA-Z0-9_-]+)/) || strUrl.match(/id=([a-zA-Z0-9_-]+)/);
                if (match) driveId = match[1];
            } else if (/^[a-zA-Z0-9_-]{20,}$/.test(strUrl) && !strUrl.includes("/")) {
                driveId = strUrl;
            }

            if (driveId) {
                return `https://drive.google.com/thumbnail?id=${driveId}&sz=w1000`;
            }
            return strUrl;
        };

            const [editingKpi, setEditingKpi] = useState(null);
            const [selectedKpiIcon, setSelectedKpiIcon] = useState('TrendingUp'); 
            const [iframeModal, setIframeModal] = useState({ isOpen: false, url: '', title: '' });

            const [deleteModal, setDeleteModal] = useState({

                id: null,

            });

            const [expandedMenus, setExpandedMenus] = useState({
                group_dash: true, group_marketing: false, group_books: false, group_orders: false, group_cs: false, group_external: false, group_settings: false
            });

            const toggleMenu = (menuId) => setExpandedMenus(prev => ({ ...prev, [menuId]: !prev[menuId] }));

            const showMsg = (text) => {
                setNotification(text);
                setTimeout(() => setNotification(null), 3000);
            };

            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return String(dateStr); 
                const yyyy = d.getFullYear(); const mm = String(d.getMonth() + 1).padStart(2, '0'); const dd = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'); const min = String(d.getMinutes()).padStart(2, '0');
                if (yyyy === 1899) return `${hh}:${min}`;
                return hh === '00' && min === '00' ? `${yyyy}/${mm}/${dd}` : `${yyyy}/${mm}/${dd} ${hh}:${min}`;
            };

            const syncWithGAS = async (action, payloadData = null) => {
                try {
                    const currentOrigin = window.location.origin;
                    const safeOrigin = currentOrigin.includes("usercontent.goog") 
                        ? "https://candylovema.github.io" 
                        : currentOrigin;

                    const payloadObj = { 
                        action: action, 
                        payload: payloadData,
                        origin: safeOrigin,
                        sessionToken: sessionToken
                    };

                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(payloadObj)
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'error') {
                        console.error("後端拒絕請求:", data.msg);
                        showMsg("拒絕存取: " + data.msg); 
                        if (data.msg.includes("驗證失敗") || data.msg.includes("未授權")) {
                            handleLogout();
                        }
                    }
                    
                    return data;
                } catch (e) {
                    console.error("GAS Sync Error:", e);
                    showMsg("網路安全通道異常: " + e.toString()); 
                    return { status: 'error', msg: e.toString() };
                }
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                if (isLoggingIn) return;
                setIsLoggingIn(true);
                showMsg('正在向雲端安全性通道驗證身分...');

                const username = e.target.username.value;
                const password = e.target.password.value;

                try {
                    const res = await syncWithGAS('LOGIN', { user: username, password: password });
                    if (res && res.status === 'success' && res.sessionToken) {
                        sessionStorage.setItem('lapen_cms_auth', 'true');
                        sessionStorage.setItem('lapen_cms_token', res.sessionToken);
                        sessionStorage.setItem('lapen_cms_user', username);
                        
                        setIsAuthenticated(true);
                        setSessionToken(res.sessionToken);
                        setActiveUser(username);
                        showMsg('身分驗證通過， Session 令牌已安全儲存！');
                    } else {
                        showMsg('登入失敗：' + (res.msg || '帳號或密碼錯誤'));
                    }
                } catch (err) {
                    showMsg('驗證發生異常：' + err.toString());
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = () => {
                sessionStorage.clear();
                setIsAuthenticated(false);
                setSessionToken('');
                setActiveUser('');
                setBooks([]);
                setChoiceBooks([]);
                setCarousels([]);
                setOrders([]);
                setAiLogs([]);
                showMsg('Session 令牌已安全銷毀，您已成功登出。');
            };

            useEffect(() => {
                if (!isAuthenticated || !sessionToken) return;

                syncWithGAS('FETCH_SETTINGS').then(res => {
                    if (res && res.data) setSettings(prev => ({...prev, ...res.data}));
                }).catch(() => {});

                syncWithGAS('FETCH_UI').then(res => {
                    if (res && res.data) setUi(res.data);
                }).catch(() => {});

                syncWithGAS('FETCH_KPIS').then(res => { 
                    if(res?.data) setKpis(res.data); 
                    setLoadStatus(prev => ({...prev, kpis: false})); 
                }).catch(() => setLoadStatus(prev => ({...prev, kpis: false})));
                
                syncWithGAS('FETCH_ORDERS').then(res => { 
                    if(res?.data) setOrders(res.data); 
                    setLoadStatus(prev => ({...prev, orders: false})); 
                }).catch(() => setLoadStatus(prev => ({...prev, orders: false})));
                
                syncWithGAS('FETCH_CS_LOGS').then(res => { 
                    if(res?.data) setAiLogs(res.data); 
                    setLoadStatus(prev => ({...prev, cs: false})); 
                }).catch(() => setLoadStatus(prev => ({...prev, cs: false})));
                
                syncWithGAS('FETCH_CAROUSELS').then(res => { 
                    if(res?.data) setCarousels(res.data); 
                    setLoadStatus(prev => ({...prev, carousels: false})); 
                }).catch(() => setLoadStatus(prev => ({...prev, carousels: false})));
                
                syncWithGAS('FETCH_CHOICES').then(res => { 
                    if(res?.data) setChoiceBooks(res.data); 
                    setLoadStatus(prev => ({...prev, choices: false})); 
                }).catch(() => setLoadStatus(prev => ({...prev, choices: false})));
                
                syncWithGAS('FETCH_BOOKS').then(res => { 
                    if(res?.data) setBooks(res.data); 
                    setLoadStatus(prev => ({...prev, books: false})); 
                }).catch(() => setLoadStatus(prev => ({...prev, books: false})));
            }, [isAuthenticated, sessionToken]);

            useEffect(() => {
                if (kpis.length === 0 || loadStatus.kpis || !isAuthenticated) return;
                let hasChanges = false;
                const updatedKpis = kpis.map(k => {
                    let titleText = String(k.title || k.id || '');
                    let dynamicValue = k.value;
                    let rawUnit = String(k.unit || '');
                    let displayUnit = rawUnit.includes('||') ? rawUnit.split('||')[0] : rawUnit;
                    let iconName = rawUnit.includes('||') ? rawUnit.split('||')[1] : '';
                    
                    if (titleText.includes('營收')) {
                        dynamicValue = 'NT$ ' + orders.reduce((s,o)=>s+Number(o.total||0),0).toLocaleString();
                        if (!iconName) iconName = 'Database';
                    } else if (titleText.includes('待處理')) {
                        dynamicValue = String(orders.filter(o=>o.status==='處理中').length);
                        displayUnit = displayUnit || '筆';
                        if (!iconName) iconName = 'Truck';
                    } else if (titleText.includes('庫存警示')) {
                        const match = titleText.match(/<(\d+)/);
                        const threshold = match ? parseInt(match[1]) : 10;
                        dynamicValue = String(books.filter(b => {
                            if (!b.title || b.title.trim() === '' || b.title === '未命名書籍') return false;
                            const st = parseInt(b.stock);
                            return (isNaN(st) ? 0 : st) < threshold;
                        }).length);
                        displayUnit = displayUnit || '項商品';
                        if (!iconName) iconName = 'BookOpen';
                    }

                    const combinedUnit = `${displayUnit}||${iconName}`;

                    if (String(dynamicValue) !== String(k.value) || combinedUnit !== String(k.unit)) {
                        hasChanges = true;
                        const newKpi = { ...k, value: dynamicValue, unit: combinedUnit };
                        syncWithGAS('UPDATE_KPI', newKpi);
                        return newKpi;
                    }
                    return k;
                });

                if (hasChanges) setKpis(updatedKpis);

                try {
                    if (type === 'book') {
                        res = await syncWithGAS('DELETE_BOOK', { id });
                        if (res.status === 'success') setBooks(books.filter(b => b.id !== id));
                    } else if (type === 'choice') {
                        res = await syncWithGAS('DELETE_CHOICE', { id });
                        if (res.status === 'success') setChoiceBooks(choiceBooks.filter(b => b.id !== id));
                    } else if (type === 'carousel') {
                        res = await syncWithGAS('DELETE_CAROUSEL', { id });
                        if (res.status === 'success') setCarousels(carousels.filter(c => c.id !== id));
                    } else if (type === 'kpi') {
                        res = await syncWithGAS('DELETE_KPI', { id });
                        if (res.status === 'success') setKpis(kpis.filter(k => k.id !== id));
                    }

                    if (res.status === 'success') {
                        showMsg('資料已成功安全刪除');
                    } else {
                        showMsg('刪除失敗：' + res.msg);
                    }
                } catch (e) {
                    showMsg('刪除出錯：' + e.toString());

                    setDeleteModal({ isOpen: false, type: '', id: null, title: '', isDeleting: false });
                }
            };

                                    <div className="space-y-1"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">簡介描述</label><textarea name="description" defaultValue={editingCarousel?.description || ''} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm h-24 resize-none font-bold outline-none transition-colors" placeholder="顯示在標題下方的副標題..." style={{ color: 'inherit' }}/></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">底圖 URL</label><input name="image" defaultValue={editingCarousel?.image || ''} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors" placeholder="背景圖連結" style={{ color: 'inherit' }}/></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">發佈狀態</label><select name="status" defaultValue={editingCarousel?.status || '已發佈'} className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors appearance-none" style={{ color: 'inherit' }}><option>已發佈</option><option>草稿</option><option>已下架</option></select></div>
                                    <button className="w-full text-white py-4 rounded-2xl font-bold shadow-xl transition-all active:scale-95 hover:opacity-90 mt-4" style={{ backgroundColor: settings.sidebarActiveColor }}>發佈行銷模組</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {showOrderModal && editingOrder && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 p-4 py-10 flex items-center justify-center" onClick={()=>setShowOrderModal(false)}>
                            <div className="w-full max-w-2xl rounded-[2.5rem] shadow-2xl animate-in border border-black/10 flex flex-col max-h-[90vh]" style={{ backgroundColor: settings.cardBgColor, color: settings.cardTextColor }} onClick={(e)=>e.stopPropagation()}>
                                <div className="p-6 border-b border-black/5 flex justify-between items-center bg-black/5 shrink-0 rounded-t-[2.5rem]">
                                    <div className="flex items-center gap-3 font-black text-lg">
                                        <div className="p-2 rounded-xl text-white" style={{ backgroundColor: settings.sidebarActiveColor }}><Truck size={18}/></div>
                                        編輯訂單細節
                                    </div>
                                    <button type="button" onClick={() => setShowOrderModal(false)} className="opacity-50 hover:opacity-100 transition"><X size={16}/></button>
                                </div>
                                <div className="overflow-y-auto flex-1 p-6 lg:p-8 sidebar-scroll">
                                    <form onSubmit={handleSaveOrder} className="space-y-6 pb-8">
                                        <div className="space-y-1.5 col-span-2">
                                            <label className="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1">訂單編號</label>
                                            <input name="orderId" defaultValue={editingOrder.id} required className="w-full bg-indigo-50 border border-indigo-200 p-3.5 rounded-2xl text-sm font-mono font-bold outline-none text-indigo-700" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">收件人</label><input name="customer" defaultValue={editingOrder.customer} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors" style={{ color: 'inherit' }}/></div>
                                            <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">聯絡電話</label><input name="phone" defaultValue={editingOrder.phone} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors" style={{ color: 'inherit' }}/></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">Email 電子信箱</label><input type="email" name="email" defaultValue={editingOrder.email || ''} className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors" style={{ color: 'inherit' }}/></div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">付款方式</label>
                                                <select name="payment" defaultValue={editingOrder.payment || '店取付現金'} className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors appearance-none" style={{ color: 'inherit' }}>
                                                    <option>店取付現金</option><option>銀行轉帳</option><option>線上刷卡</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">寄送地址</label><input name="address" defaultValue={editingOrder.address || ''} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none transition-colors" style={{ color: 'inherit' }}/></div>
                                        
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-amber-500 uppercase tracking-widest ml-1">寄件與訂單備註</label>
                                            <textarea name="memo" defaultValue={editingOrder.memo || ''} className="w-full bg-amber-50 border border-amber-200 p-3.5 rounded-2xl text-sm font-bold outline-none h-20 resize-none text-amber-900" placeholder="買家留下的備註將顯示於此..."/>
                                        </div>

                                        <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">購買內容 (格式: 書名 x數量, ...)</label><textarea name="items" defaultValue={editingOrder.items} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none h-24 resize-none leading-relaxed" style={{ color: 'inherit' }}/></div>
                                        
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">訂單總金額</label><input name="total" type="number" defaultValue={editingOrder.total} required className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-mono font-bold outline-none text-red-600" /></div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black opacity-60 uppercase tracking-widest ml-1">處理狀態</label>
                                                <select name="status" defaultValue={editingOrder.status} className="w-full bg-black/5 border border-black/10 p-3.5 rounded-2xl text-sm font-bold outline-none appearance-none" style={{ color: settings.sidebarActiveColor }}>
                                                    <option>處理中</option><option>已派送</option><option>已完成</option><option>已取消</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="pt-6 pb-2">
                                            <button className="w-full text-white py-4 rounded-2xl font-bold shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 hover:opacity-90" style={{ backgroundColor: settings.sidebarActiveColor }}><Save size={18}/> 儲存訂單變更</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {showKpiModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 p-4 py-10 flex items-center justify-center" onClick={()=>setShowKpiModal(false)}>
                            <div className="w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-in border border-black/10 flex flex-col max-h-[90vh]" style={{ backgroundColor: settings.cardBgColor, color: settings.cardTextColor }} onClick={(e)=>e.stopPropagation()}>
                                <div className="p-6 border-b border-black/5 flex justify-between items-center bg-black/5 shrink-0 rounded-t-[2.5rem]">
                                    <div className="flex items-center gap-3 font-black text-lg">
                                        <div className="p-2 rounded-xl text-white" style={{ backgroundColor: settings.sidebarActiveColor }}><TrendingUp size={18}/></div>
                                        管理自訂指標 (KPI)
                                    </div>
                                    <button type="button" onClick={() => { setShowKpiModal(false); setEditingKpi(null); }} className="opacity-50 hover:opacity-100 transition"><X size={16}/></button>
                                </div>
                                <div className="overflow-y-auto flex-1 p-6 lg:p-8 sidebar-scroll">
                                    <form onSubmit={handleSaveKpi} className="bg-black/5 p-6 rounded-2xl border border-black/10 mb-8">
                                        <h4 className="text-sm font-black mb-4 opacity-80">{editingKpi ? '編輯指標' : '新增指標'}</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                                            <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase">標題 (Title)</label><input name="title" defaultValue={editingKpi?.title || ''} required className="w-full bg-white border border-black/10 p-2.5 rounded-xl text-sm font-bold outline-none" placeholder="例如: 本月訪客" style={{ color: 'inherit' }}/></div>
                                            <div className="space-y-1.5"><label className="text-[10px] font-black opacity-60 uppercase">數值 (Value)</label><input name="value" defaultValue={editingKpi?.value || ''} required className="w-full bg-white border border-black/10 p-2.5 rounded-xl text-sm font-bold outline-none" placeholder="例如: 12,345" style={{ color: 'inherit' }}/></div>
                                            
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black opacity-60 uppercase">單位 (Unit)</label>
                                                <input 
                                                    name="unit" 
                                                    defaultValue={editingKpi ? (String(editingKpi.unit || '').includes('||') ? String(editingKpi.unit).split('||')[0] : editingKpi.unit) : ''} 
                                                    className="w-full bg-white border border-black/10 p-2.5 rounded-xl text-sm font-bold outline-none" 
                                                    placeholder="例如: 人次" 
                                                    style={{ color: 'inherit' }}
                                                />
                                            </div>
                                        </div>

                                        <div className="md:col-span-3 space-y-2 mt-4 mb-6">
                                            <label className="text-[10px] font-black opacity-60 uppercase">選擇卡片圖示與顏色</label>
                                            <div className="flex flex-wrap gap-2">
                                                {Object.keys(availableIcons).map(iconKey => {
                                                    const IconComp = availableIcons[iconKey].icon;
                                                    const isSelected = selectedKpiIcon === iconKey;
                                                    return (
                                                        <button 
                                                            type="button" 
                                                            key={iconKey}
                                                            onClick={() => setSelectedKpiIcon(iconKey)}
                                                            className={`p-3 rounded-xl transition-all shadow-sm ${isSelected ? 'bg-indigo-100 border-2 border-indigo-500 scale-110 text-indigo-600' : 'bg-white border border-zinc-200 hover:bg-zinc-50 hover:scale-105 text-zinc-600'} ${availableIcons[iconKey].color}`}
                                                        >
                                                            <IconComp size={20} />
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                        </div>

                                        <div className="flex justify-end gap-2">
                                            {editingKpi && <button type="button" onClick={() => { setEditingKpi(null); setSelectedKpiIcon('TrendingUp'); }} className="px-4 py-2 rounded-xl text-xs font-bold opacity-60 hover:opacity-100 transition">取消編輯</button>}
                                            <button className="text-white px-6 py-2.5 rounded-xl text-xs font-bold transition-all active:scale-[0.98] flex items-center gap-1.5 shadow-md hover:opacity-90" style={{ backgroundColor: settings.sidebarActiveColor }}><Save size={14}/> 儲存指標</button>
                                        </div>
                                    </form>

                                    <h4 className="text-sm font-black mb-3 opacity-80">現有指標列表</h4>
                                    <div className="space-y-3 pb-8">
                                        {kpis.map(k => {
                                            const displayTitle = k.title || k.id || '';
                                            const rawUnit = String(k.unit || '');
                                            const displayUnit = rawUnit.includes('||') ? rawUnit.split('||')[0] : rawUnit;

                                            return (
                                                <div key={k.id} className="flex justify-between items-center bg-black/5 p-4 rounded-2xl border border-black/10 shadow-sm">
                                                    <div>
                                                        <div className="text-[10px] font-bold opacity-60 tracking-wider uppercase mb-0.5">{displayTitle}</div>
                                                        <div className="text-lg font-black">{k.value} <span className="text-xs opacity-60">{displayUnit}</span></div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button type="button" onClick={() => { setEditingKpi(k); }} className="opacity-50 hover:opacity-100 hover:text-indigo-500 p-2 rounded-lg transition"><Edit2 size={14}/></button>
                                                        <button type="button" onClick={() => openDeleteModal('kpi', k.id, k.title)} className="opacity-50 hover:opacity-100 hover:text-red-500 p-2 rounded-lg transition"><Trash2 size={14}/></button>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCSModal && editingCSLog && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 p-4 py-10 flex items-center justify-center" onClick={()=>setShowCSModal(false)}>
                            <div className="w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-in border border-black/10 flex flex-col max-h-[90vh]" style={{ backgroundColor: settings.cardBgColor, color: settings.cardTextColor }} onClick={(e)=>e.stopPropagation()}>
                                <div className="p-6 border-b border-indigo-100 flex justify-between items-center bg-indigo-50/50 shrink-0 rounded-t-[2.5rem]">
                                    <div className="flex items-center gap-3 font-black text-lg text-indigo-900">
                                        <div className="p-2 rounded-xl bg-indigo-500 text-white"><MessageSquare size={18}/></div>
                                        智能客服回覆中心
                                    </div>
                                    <button type="button" onClick={() => setShowCSModal(false)} className="bg-white p-2 rounded-full border border-indigo-200 text-indigo-400 hover:text-indigo-800 transition"><X size={16}/></button>
                                </div>
                                <div className="p-6 lg:p-8 space-y-6 overflow-y-auto flex-1 sidebar-scroll">
                                    <div className="bg-black/5 p-5 rounded-2xl border border-black/10 relative">
                                        <div className="absolute -top-3 left-4 px-2 text-[10px] font-black opacity-60 tracking-widest uppercase" style={{ backgroundColor: settings.cardBgColor }}>讀者 {editingCSLog.user} 的訊息</div>
                                        <div className="text-sm font-bold leading-relaxed pt-2 whitespace-pre-wrap">「{editingCSLog.query}」</div>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-end px-1">
                                            <label className="text-[10px] font-black opacity-60 uppercase tracking-widest">您的回覆內容</label>
                                            <button type="button" onClick={handleGenerateAI} disabled={isAIGenerating} className="text-[10px] bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-1.5 hover:shadow-lg hover:shadow-indigo-500/30 transition-all active:scale-95 disabled:opacity-50">
                                                {isAIGenerating ? <Clock size={12} className="animate-spin"/> : <Sparkles size={12}/>}
                                                {isAIGenerating ? 'AI 撰寫中...' : '✨ 啟動 AI 擬稿'}
                                            </button>
                                        </div>
                                        <textarea 
                                            value={csResponseText}
                                            onChange={(e) => setCsResponseText(e.target.value)}
                                            placeholder="請輸入您要回覆給讀者的訊息..." 
                                            className="w-full bg-black/5 border-2 border-black/10 p-5 rounded-2xl text-sm h-40 resize-none font-bold outline-none leading-relaxed"
                                            style={{ color: 'inherit' }}
                                        />
                                    </div>
                                    <div className="pt-2 pb-4">
                                        <button className="w-full text-white py-4 rounded-2xl font-bold shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2 hover:opacity-90" style={{ backgroundColor: settings.sidebarActiveColor }} onClick={handleSaveCS}>
                                            <CheckCircle size={18}/> 確認送出回覆
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {iframeModal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-50 p-4 py-10 flex items-center justify-center" onClick={() => setIframeModal(prev => ({ ...prev, isOpen: false }))}>
                            <div className="w-full max-w-5xl h-full max-h-[90vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden animate-in border border-black/10" style={{ backgroundColor: settings.cardBgColor, color: settings.cardTextColor }} onClick={(e) => e.stopPropagation()}>
                                <div className="p-5 border-b border-black/5 flex justify-between items-center bg-black/5 shrink-0">
                                    <h2 className="text-xl font-black flex items-center gap-3 tracking-widest"><ExternalLink size={20} style={{ color: settings.sidebarActiveColor }} /> {iframeModal.title}</h2>
                                    <button type="button" onClick={() => setIframeModal(prev => ({ ...prev, isOpen: false }))} className="bg-black/5 border border-black/10 hover:bg-black/10 px-4 py-2 rounded-full text-sm font-bold transition flex items-center gap-2 shadow-sm"><X size={16} /> 關閉</button>
                                </div>
                                <div className="flex-1 w-full relative overflow-y-auto sidebar-scroll" style={{ backgroundColor: '#ffffff' }}>
                                    {iframeModal.url && <iframe src={iframeModal.url} className="w-full h-full border-0 min-h-[600px]"></iframe>}
                                </div>
                            </div>
                        </div>
                    )}

                    {notification && <div className="fixed bottom-12 right-12 bg-zinc-900 text-white px-8 py-5 rounded-2xl shadow-2xl animate-in font-bold text-sm z-[200] flex items-center gap-3 border border-zinc-700"><CheckCircle size={20} className="text-emerald-400" /> {notification}</div>}
                </div> 
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
